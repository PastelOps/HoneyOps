---
# Ansible Tasks for Cowrie SSH/Telnet Honeypot
##############################################

# Available tags:
# - debug
# - never
# - always
# - update
# - root      -- this tags require sudo access
# - docker    -- for use with docker
##############################################

- import_tasks: cowrie-os.yaml
  tags:
    - cowrie
    - root

# Install Cowrie
################

- name: Git clone Cowrie repository
  tags: [git]
  become: true
  become_user: "{{ cowrie_user }}"
  git:
    repo: "{{ cowrie_repo }}"
    dest: "{{ cowrie_dir }}"
    version: "{{ cowrie_version }}"
    force: true

- name: Install Cowrie config file
  tags: [cfg]
  become: true
  become_user: "{{ cowrie_user }}"
  template:
    src: templates/cowrie.cfg.j2
    dest: "{{ cowrie_dir }}/etc/cowrie.cfg"

- name: Ensure Cowrie config file has telnet enabled
  tags: [cfg]
  become: true
  become_user: "{{ cowrie_user }}"
  ini_file:
    path: "{{ cowrie_dir }}/etc/cowrie.cfg"
    section: telnet
    option: enabled
    value: true

- import_tasks: cowrie-venv.yaml
  become: true
  become_user: "{{ cowrie_user }}"
  tags:
    - cowrie
    - python
    - virtualenv

- name: Create backup of cowrie folder for randomize
  become: true
  command: "cp -r {{ cowrie_dir }} {{ cowrie_backup_dir }}"
  
# Execute Cowrie Obscurer.py
# https://github.com/James-Hall/obscurer
# https://github.com/luftl0ch/cowrie-obscurer/
# https://github.com/YuqianSong6/cowrie-obscurer/

- name: Install Cowrie Obscurer
  become: true
  become_user: "{{ cowrie_user }}"
  template:
    src: templates/cowrie.obscurer.py.j2
    dest: "{{ cowrie_home }}/cowrie.obscurer.py"

- name: Install Venv Wrapper
  become: true
  become_user: "{{ cowrie_user }}"
  template:
    src: templates/venv_exec.j2
    dest: "{{ cowrie_venv }}/exec"
    mode: "0755"

- import_tasks: cowrie-startup.yaml
  become: true
  tags:
    - cowrie
    - root


